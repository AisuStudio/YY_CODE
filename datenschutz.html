  <script src="config.js"></script>

        <script>
    // Mobile burger nav
    const burger = document.querySelector('.site-nav__burger');
    const navLeft  = document.querySelector('.site-nav__links--left');
    const navRight = document.querySelector('.site-nav__links--right');
    if (burger) {
      burger.addEventListener('click', function() {
        const open = navLeft.classList.toggle('open');
        navRight.classList.toggle('open');
        this.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }
  </script>

  <script>
    async function renderDatenschutz() {
      const rows = await YYSheets.getDatenschutzData();
      const root = document.getElementById('legal-root');
      let html = '';
      let firstH1 = true;
      for (const row of rows) {
        if (row.h1) {
          html += firstH1
            ? `<h1 class="legal-h1">${row.h1}</h1>`
            : `<h2 class="legal-h2">${row.h1}</h2>`;
          firstH1 = false;
        }
        if (row.h2) html += `<h3 class="legal-h3">${row.h2}</h3>`;
        if (row.strong) html += `<span class="legal-strong">${row.strong}</span>`;
        if (row.p) html += `<p class="legal-p">${row.p.replace(/\n/g, '<br>')}</p>`;
      }
      root.innerHTML = html;
    }
    renderDatenschutz().catch(err => {
      document.getElementById('legal-root').innerHTML = '<p style="padding:48px">Inhalte konnten nicht geladen werden.</p>';
      console.error(err);
    });
  </script>
</body>
