<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — YamYam Berlin</title>
  <meta name="description" content="Diese Seite existiert nicht. Aber unser Bibimbap schon.">
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="global.css">
  <style>
    .error-page {
      min-height: 100vh;
      padding-top: var(--nav-height);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-left: var(--gap);
      padding-right: var(--gap);
      padding-bottom: 40px;
      gap: 16px;
    }
    .error-page__code {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(96px, 20vw, 220px);
      line-height: 1;
      letter-spacing: var(--tracking-display);
      color: var(--red);
    }
    .error-page__headline {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(24px, 3.5vw, 40px);
      line-height: 1.1;
      letter-spacing: var(--tracking-display);
      color: var(--red);
      text-transform: uppercase;
    }
    .error-page__img {
      max-width: 300px;
      width: 100%;
      height: auto;
      margin: 16px 0;
    }
    .error-page__text {
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      color: var(--black);
    }
    .error-page__cta {
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <div class="site-nav__inner">
      <ul class="site-nav__links site-nav__links--left" role="list">
        <li><a href="menue.html">Menue</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="jobs.html">Jobs</a></li>
      </ul>
      <a href="index.html" class="site-nav__logo" aria-label="YamYam Berlin Home">
        <img src="images/logos/YY_Logo_Red.svg" alt="YamYam Berlin">
      </a>
      <ul class="site-nav__links site-nav__links--right" role="list">
        <li><a href="https://app.resmio.com/yamyam-berlin/widget" target="_blank" rel="noopener">Reserve</a></li>
        <li><a href="https://wolt.com/en/deu/berlin/restaurant/yamyam" target="_blank" rel="noopener">Order Online</a></li>
        <li>
          <a href="https://www.instagram.com/yamyamberlin" target="_blank" rel="noopener" class="site-nav__ig" aria-label="Instagram">
            <img src="images/icons/ig_icon.svg" alt="Instagram" width="28" height="28">
          </a>
        </li>
      </ul>
      <button class="site-nav__burger" aria-label="Menu öffnen" aria-expanded="false">
        <img src="images/icons/burger.png" alt="">
      </button>
    </div>
  </nav>

  <main class="error-page" role="main">
    <h1 class="error-page__code">404</h1>
    <p class="error-page__headline">Where is the Bibimbap?</p>
    <img src="images/other/404doggo.png" alt="Verirrter Doggo" class="error-page__img">
    <p class="error-page__text">This page does not exist. But our Bibimbap does.</p>
    <a href="menue.html" class="btn-outline error-page__cta">
      Back to Menu
      <img src="images/icons/arrow.svg" alt="" class="btn-arrow">
    </a>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="site-footer__inner">
      <a href="index.html" class="site-footer__logo">
        <img src="images/logos/YY_Logo_Red.svg" alt="YamYam Berlin" height="32">
      </a>
      <p class="site-footer__copy">© Copyright 2026 YamYam Berlin GmbH</p>
      <span></span>
      <a href="datenschutz.html" class="site-footer__legal">Impressum &amp; Datenschutz</a>
    </div>
  </footer>

  <script>
    const burger = document.querySelector('.site-nav__burger');
    const navLeft  = document.querySelector('.site-nav__links--left');
    const navRight = document.querySelector('.site-nav__links--right');
    if (burger) {
      burger.addEventListener('click', function() {
        const open = navLeft.classList.toggle('open');
        navRight.classList.toggle('open');
        this.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }
  </script>

</body>
</html>
