  <style>
    body { padding-top: var(--nav-height); }

    .about-hero {
      position: relative;
      min-height: 55vh;
      overflow: hidden;
      background: var(--bg);
    }
    .about-hero__bg {
      position: absolute; inset: 0;
    }
    .about-hero__bg img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      opacity: 0.35;
    }
    .about-hero__title {
      position: absolute;
      bottom: 48px;
      left: calc((100% - var(--page-width)) / 2 + var(--gap));
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(28px, 5vw, 56px);
      letter-spacing: var(--tracking-display);
      text-transform: uppercase;
      color: var(--red);
      line-height: 1;
      white-space: nowrap;
    }

    .about-section {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 72px var(--gap);
    }
    .about-section__title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(20px, 3vw, 36px);
      letter-spacing: var(--tracking-display);
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 24px;
    }
    .about-section p {
      font-family: var(--font-body);
      font-size: var(--fs-body-lg);
      line-height: 1.8;
      color: var(--black);
      margin-bottom: 16px;
      max-width: var(--page-width);
    }

    /* Team */
    .about-team {
      position: relative;
      overflow: hidden;
      padding: 72px var(--gap);
      background: var(--bg);
    }
    .about-team__bg {
      position: absolute; inset: 0; pointer-events: none;
    }
    .about-team__bg img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      opacity: 0.15;
    }
    .about-team__content {
      position: relative; z-index: 1;
      max-width: var(--page-width);
      margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 64px; align-items: center;
    }
    .about-team__img img { width: 100%; display: block; }

    

    .about-impressions {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 72px var(--gap);
    }
    .about-impressions img {
      width: 100%; max-width: var(--page-width);
      display: block; margin-bottom: 24px;
    }

    @media (max-width: 900px) {
      .about-team__content { grid-template-columns: 1fr; }
      .about-hero__title { white-space: normal; }
    }
  </style>

  <!-- Dynamic sections rendered by JS -->
  <div id="about-root"></div>

    <div class="site-footer__inner">
      <a href="index.html" class="site-footer__logo">

  <script src="config.js"></script>
  <script src="sheets.js"></script>
        <script>
    // Mobile burger nav
    const burger = document.querySelector('.site-nav__burger');
    const navLeft  = document.querySelector('.site-nav__links--left');
    const navRight = document.querySelector('.site-nav__links--right');
    if (burger) {
      burger.addEventListener('click', function() {
        const open = navLeft.classList.toggle('open');
        navRight.classList.toggle('open');
        this.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }
  </script>

  <script>
    async function renderAbout() {
      const sections = await YYSheets.getAboutData();
      const root = document.getElementById('about-root');
      if (sections[0]) {
        document.getElementById('about-hero-title').textContent = sections[0].headline;
      }
      sections.forEach((sec, i) => {
        if (i === 0) {
          root.innerHTML += `<section class="about-section">
            <div style="max-width:640px">
              ${sec.text.split('\n\n').map(p => `<p>${p}</p>`).join('')}
            </div>
          </section>`;
          return;
        }
        if (i === 1) {
          root.innerHTML += `<section class="about-team">
            <div class="about-team__bg"><img src="images/backgrounds/yy_Folks_02.png" alt=""></div>
            <div class="about-team__content">
              <div>
                <h2 class="about-section__title">${sec.headline}</h2>
                ${sec.text.split('\n\n').map(p => `<p>${p}</p>`).join('')}
                ${sec.cta ? `<a href="jobs.html" class="btn-outline">${sec.cta} <img src="images/icons/arrow.svg" alt="" class="btn-arrow" width="16" height="16"></a>` : ''}
              </div>
              <div class="about-team__img">
                <img src="images/backgrounds/yy_team.png" alt="YamYam Team">
              </div>
            </div>
          </section>`;
          return;
        }
        root.innerHTML += `<section class="about-section">
          <h2 class="about-section__title">${sec.headline}</h2>
          ${sec.text.split('\n\n').map(p => `<p>${p}</p>`).join('')}
          ${sec.cta ? `<a href="jobs.html" class="btn-outline">${sec.cta} <img src="images/icons/arrow.svg" alt="" class="btn-arrow" width="16" height="16"></a>` : ''}
        </section>`;
      });
    }
    renderAbout().catch(err => {
      document.getElementById('about-root').innerHTML = '<p style="padding:48px">Inhalte konnten nicht geladen werden.</p>';
      console.error(err);
    });
  </script>
