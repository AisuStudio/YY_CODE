<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — YamYam Berlin · Home of Korean Food</title>
  <link rel="stylesheet" href="global.css">
  <style>
    body { padding-top: var(--nav-height); }

    .about-hero {
      position: relative;
      min-height: 55vh;
      overflow: hidden;
      background: var(--bg);
    }
    .about-hero__bg {
      position: absolute; inset: 0;
    }
    .about-hero__bg img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      opacity: 0.35;
    }
    .about-hero__title {
      position: absolute;
      bottom: 48px; left: var(--gap);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(28px, 5vw, 56px);
      letter-spacing: var(--tracking-display);
      text-transform: uppercase;
      color: var(--red);
      line-height: 1;
      white-space: nowrap;
    }

    .about-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 72px var(--gap);
    }
    .about-section__title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(20px, 3vw, 36px);
      letter-spacing: var(--tracking-display);
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 24px;
    }
    .about-section p {
      font-family: var(--font-body);
      font-size: var(--fs-body-lg);
      line-height: 1.8;
      color: var(--black);
      margin-bottom: 16px;
      max-width: 640px;
    }

    /* Team */
    .about-team {
      position: relative;
      overflow: hidden;
      padding: 72px var(--gap);
      background: var(--bg);
    }
    .about-team__bg {
      position: absolute; inset: 0; pointer-events: none;
    }
    .about-team__bg img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      opacity: 0.15;
    }
    .about-team__content {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 64px; align-items: center;
    }
    .about-team__img img { width: 100%; display: block; }

    .btn-outline {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 20px;
      font-family: var(--font-accent);
      font-style: italic; font-weight: 700; font-size: 16px;
      color: var(--red); border: 1.5px solid var(--red);
      padding: 8px 20px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-outline:hover { background: var(--red); color: var(--white); }

    .about-impressions {
      max-width: 1200px; margin: 0 auto;
      padding: 72px var(--gap);
    }
    .about-impressions img {
      width: 100%; max-width: 700px;
      display: block; margin-bottom: 24px;
    }

    @media (max-width: 900px) {
      .about-team__content { grid-template-columns: 1fr; }
      .about-hero__title { white-space: normal; }
    }
  </style>
</head>
<body>

  <nav class="site-nav" role="navigation">
    <div class="site-nav__inner">
      <ul class="site-nav__links site-nav__links--left" role="list">
        <li><a href="menu.html">Menue</a></li>
        <li><a href="about.html" class="active">About</a></li>
        <li><a href="jobs.html">Jobs</a></li>
      </ul>
      <a href="index.html" class="site-nav__logo">
        <img src="images/logos/YY_Logo_Red.svg" alt="YamYam Berlin">
      </a>
      <ul class="site-nav__links site-nav__links--right" role="list">
        <li><a href="https://app.resmio.com/yamyam-berlin/widget" target="_blank" rel="noopener">Reserve</a></li>
        <li><a href="https://wolt.com/en/deu/berlin/restaurant/yamyam" target="_blank" rel="noopener">Order Online</a></li>
        <li>
          <a href="https://www.instagram.com/yamyamberlin" target="_blank" rel="noopener" class="site-nav__ig">
            <img src="images/icons/ig_icon.svg" alt="Instagram" width="28" height="28">
          </a>
        </li>
      </ul>
      <button class="site-nav__toggle" aria-label="Menu öffnen" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="about-hero">
    <div class="about-hero__bg">
      <img src="images/backgrounds/yy_about_venue.jpg" alt="YamYam Berlin">
    </div>
    <h1 class="about-hero__title" id="about-hero-title">…</h1>
  </section>

  <!-- Dynamic sections rendered by JS -->
  <div id="about-root"></div>

  <footer class="site-footer" role="contentinfo">
    <div class="site-footer__inner">
      <p class="site-footer__copy">© Copyright 2026 YamYam Berlin GmbH</p>
      <nav class="site-footer__links">
        <a href="datenschutz.html">Impressum &amp; Datenschutz</a>
        <a href="mailto:contact@yamyam-berlin.de">contact@yamyam-berlin.de</a>
        <a href="https://www.instagram.com/yamyamberlin" target="_blank" rel="noopener">
          <img src="images/icons/ig_icon.svg" alt="Instagram" width="16" height="16" style="vertical-align:middle">
        </a>
      </nav>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="sheets.js"></script>
  <script>
    document.querySelector('.site-nav__toggle').addEventListener('click', function() {
      document.querySelector('.site-nav__links').classList.toggle('open');
    });

    async function renderAbout() {
      const sections = await YYSheets.getAboutData();
      const root = document.getElementById('about-root');

      // Hero title = first section headline
      if (sections[0]) {
        document.getElementById('about-hero-title').textContent = sections[0].headline;
      }

      sections.forEach((sec, i) => {
        // First section = intro text block
        if (i === 0) {
          root.innerHTML += `
            <section class="about-section">
              <div style="max-width:640px">
                ${sec.text.split('\n\n').map(p => `<p>${p}</p>`).join('')}
              </div>
            </section>`;
          return;
        }

        // Second section = Team (with BG image)
        if (i === 1) {
          root.innerHTML += `
            <section class="about-team">
              <div class="about-team__bg">
                <img src="images/backgrounds/yy_Folks_02.png" alt="">
              </div>
              <div class="about-team__content">
                <div>
                  <h2 class="about-section__title">${sec.headline}</h2>
                  ${sec.text.split('\n\n').map(p => `<p>${p}</p>`).join('')}
                  ${sec.cta ? `<a href="jobs.html" class="btn-outline">${sec.cta} →</a>` : ''}
                </div>
                <div class="about-team__img">
                  <img src="images/backgrounds/yy_team.png" alt="YamYam Team">
                </div>
              </div>
            </section>`;
          return;
        }

        // Remaining = generic sections
        root.innerHTML += `
          <section class="about-section">
            <h2 class="about-section__title">${sec.headline}</h2>
            ${sec.text.split('\n\n').map(p => `<p>${p}</p>`).join('')}
            ${sec.cta ? `<a href="jobs.html" class="btn-outline">${sec.cta} →</a>` : ''}
          </section>`;
      });
    }

    renderAbout().catch(err => {
      document.getElementById('about-root').innerHTML = '<p style="padding:48px">Inhalte konnten nicht geladen werden.</p>';
      console.error(err);
    });
  </script>
</body>
</html>
